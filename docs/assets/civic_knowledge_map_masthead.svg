<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1448 1086" role="img" aria-labelledby="title desc">
  <title id="title">Civic knowledge map masthead illustration</title>
  <desc id="desc">A simplified vector illustration of a central knowledge card connected to evidence, lived experience, user and decision symbols. The SVG canvas has a transparent background.</desc>
  <defs>
    <style>
      .navy{fill:#082B4C}
      .line{stroke:#082B4C;stroke-width:8;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .blue{fill:#1E78C8}
      .light{fill:#D9EAF8}
      .light2{fill:#CFE2F2}
      .teal{fill:#35B99E}
      .white{fill:#FFFFFF}
      .muted-line{stroke:#082B4C;stroke-width:7;stroke-linecap:round}
    </style>
  </defs>

  <!-- Connections -->
  <path class="line" d="M512 558 H458 C420 558 360 558 360 498 V465"/>
  <path class="line" d="M505 774 H392"/>
  <path class="line" d="M966 420 H1034 C1086 420 1106 398 1106 353 V304"/>
  <path class="line" d="M966 804 H1064"/>

  <!-- Connector dots -->
  <circle cx="512" cy="558" r="20" class="light"/>
  <circle cx="447" cy="774" r="20" class="teal"/>
  <circle cx="1035" cy="420" r="20" class="teal"/>
  <circle cx="1008" cy="804" r="20" class="light"/>

  <!-- Document icon -->
  <g transform="translate(120 80)">
    <path class="white" d="M50 0 H260 L330 70 V370 C330 400 306 424 276 424 H50 C22 424 0 402 0 374 V50 C0 22 22 0 50 0 Z"/>
    <path class="navy" d="M260 0 L330 70 H260 Z"/>
    <rect x="38" y="47" width="103" height="103" rx="8" class="light2"/>
    <line x1="38" y1="196" x2="286" y2="196" class="muted-line"/>
    <line x1="38" y1="235" x2="286" y2="235" class="muted-line"/>
    <line x1="38" y1="273" x2="245" y2="273" class="muted-line"/>
    <rect x="38" y="322" width="205" height="25" rx="5" class="teal"/>
    <line x1="38" y1="374" x2="145" y2="374" class="muted-line"/>
  </g>

  <!-- User icon -->
  <g transform="translate(150 674)">
    <circle cx="125" cy="125" r="125" class="light"/>
    <circle cx="125" cy="82" r="43" class="navy"/>
    <path class="navy" d="M35 250 C38 165 76 135 125 135 C174 135 212 165 215 250 Z"/>
  </g>

  <!-- Speech bubble -->
  <g transform="translate(1018 106)">
    <path class="light" d="M88 0 H196 C245 0 284 39 284 88 V113 C284 162 245 201 196 201 H75 L34 235 C20 247 2 235 10 218 L25 181 C9 164 0 140 0 113 V88 C0 39 39 0 88 0 Z"/>
    <circle cx="92" cy="99" r="21" class="blue"/>
    <circle cx="142" cy="99" r="21" class="blue"/>
    <circle cx="192" cy="99" r="21" class="blue"/>
  </g>

  <!-- Decision/check icon -->
  <g transform="translate(1064 728)">
    <circle cx="100" cy="100" r="100" class="teal"/>
    <path d="M59 100 L87 128 L143 67" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Central card -->
  <g transform="translate(506 278)">
    <rect x="0" y="0" width="460" height="594" rx="54" class="white"/>

    <!-- Network symbol -->
    <g transform="translate(78 60)">
      <line x1="152" y1="20" x2="280" y2="96" class="line"/>
      <line x1="280" y1="96" x2="280" y2="230" class="line"/>
      <line x1="280" y1="230" x2="152" y2="306" class="line"/>
      <line x1="152" y1="306" x2="24" y2="230" class="line"/>
      <line x1="24" y1="230" x2="24" y2="96" class="line"/>
      <line x1="24" y1="96" x2="152" y2="20" class="line"/>
      <line x1="24" y1="96" x2="152" y2="163" class="line"/>
      <line x1="280" y1="96" x2="152" y2="163" class="line"/>
      <line x1="152" y1="163" x2="152" y2="306" class="line"/>

      <circle cx="152" cy="20" r="24" class="navy"/>
      <circle cx="280" cy="96" r="24" class="navy"/>
      <circle cx="280" cy="230" r="24" class="navy"/>
      <circle cx="152" cy="306" r="24" class="navy"/>
      <circle cx="24" cy="230" r="24" class="navy"/>
      <circle cx="24" cy="96" r="24" class="navy"/>
      <circle cx="152" cy="163" r="50" class="blue"/>
    </g>

    <!-- Card content lines -->
    <rect x="50" y="400" width="360" height="49" rx="8" class="light2"/>
    <line x1="52" y1="485" x2="410" y2="485" class="muted-line"/>
    <line x1="52" y1="524" x2="306" y2="524" class="muted-line"/>
  </g>
</svg>
